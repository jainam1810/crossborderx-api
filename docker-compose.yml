services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: crossborderx
      POSTGRES_USER: cbx
      POSTGRES_PASSWORD: cbx123
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U cbx -d crossborderx' ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  pgdata:
